services:
  db:
    image: postgres:14-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tcms
    volumes:
      - tcms-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tcms
      JWT_SECRET: change-me-in-production
      PORT: "3001"
      HOST: 0.0.0.0
      CORS_ORIGIN: http://localhost:5001
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "5001:5001"
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  tcms-pgdata:
